<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>视频倍速控制</title>
    <link rel="stylesheet" href="./css/popup.css" />
  </head>
  <body>
    <div class="header">
      <div class="header-left">
        <div class="header-icon">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <h1>视频倍速</h1>
      </div>
      <div id="speed-display" class="current-speed-display">检测中...</div>
    </div>

    <div class="grid-container">
      <button data-rate="0.25">0.25x</button>
      <button data-rate="0.5">0.5x</button>
      <button data-rate="0.75">0.75x</button>
      <button data-rate="1.0">正常</button>

      <button data-rate="1.25">1.25x</button>
      <button data-rate="1.5">1.5x</button>
      <button data-rate="1.75">1.75x</button>
      <button data-rate="2.0">2.0x</button>

      <button data-rate="2.5">2.5x</button>
      <button data-rate="3.0">3.0x</button>
      <button data-rate="4.0">4.0x</button>
      <button data-rate="5.0">5.0x</button>

      <button data-rate="8.0">8.0x</button>
      <button data-rate="10.0">10x</button>
      <button data-rate="12.0">12x</button>
      <button data-rate="16.0">16x</button>
    </div>

    <div class="footer">
      <div class="footer-title">快捷键</div>
      <div class="shortcut-list">
        <span class="shortcut-item"><span class="key">Z</span> 减速</span>
        <span class="shortcut-item"><span class="key">X</span> 重置</span>
        <span class="shortcut-item"><span class="key">C</span> 加速</span>
      </div>
      <div class="shortcut-hint">
        <span class="key">0</span>-<span class="key">9</span>
        <span>输入数字直接设置倍速</span>
      </div>
    </div>

    <script src="/js/popup.js"></script>
  </body>
</html>
